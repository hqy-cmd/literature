name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      rollback_ref:
        description: "Optional git ref/tag/commit to deploy (for rollback)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    env:
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.rollback_ref || github.sha }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Validate required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          [ -n "$VPS_HOST" ] || (echo "Missing required secret: VPS_HOST" && exit 1)
          [ -n "$VPS_PORT" ] || (echo "Missing required secret: VPS_PORT" && exit 1)
          [ -n "$VPS_USER" ] || (echo "Missing required secret: VPS_USER" && exit 1)
          [ -n "$VPS_SSH_KEY" ] || (echo "Missing required secret: VPS_SSH_KEY" && exit 1)
          [ -n "$VPS_PATH" ] || (echo "Missing required secret: VPS_PATH" && exit 1)

      - name: Checkout target ref
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project files to VPS
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "remote-data/" \
            --exclude "literature-library/files/" \
            --exclude "__pycache__/" \
            --exclude ".env" \
            -e "ssh -p ${{ secrets.VPS_PORT }}" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/"

      - name: Deploy without overriding existing env
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p '${{ secrets.VPS_PATH }}'"
          if ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "[ ! -f '${{ secrets.VPS_PATH }}/.env' ]"; then
            if [ -z "${{ secrets.PROD_ENV_FILE }}" ]; then
              echo ".env not found on VPS and PROD_ENV_FILE secret is empty"
              exit 1
            fi
            printf '%s\n' "${{ secrets.PROD_ENV_FILE }}" | ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "cat > '${{ secrets.VPS_PATH }}/.env'"
          else
            echo "Keep existing .env on VPS"
          fi
          ssh -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          set -euo pipefail
          cd "${{ secrets.VPS_PATH }}"
          # Clean stale/orphan containers first to avoid "No such container" recreate race.
          docker compose down --remove-orphans || true
          if ! docker compose up -d --build --remove-orphans; then
            docker rm -f html_project-api-1 html_project-worker-1 html_project-caddy-1 2>/dev/null || true
            docker compose up -d --build --remove-orphans --force-recreate
          fi
          docker compose exec -T api python scripts/migrate_papers_to_db.py
          docker compose ps
          curl -fsS "http://127.0.0.1:8080/api/health" >/dev/null
          curl -fsS "http://127.0.0.1:8080/api/papers?page=1&page_size=1" >/dev/null
          EOF

      - name: Post-deploy summary
        run: |
          echo "Deployed ref: $DEPLOY_REF"
          echo "Target host: ${{ secrets.VPS_HOST }}"
          echo "Data migration executed: scripts/migrate_papers_to_db.py"
